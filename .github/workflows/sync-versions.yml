name: Sync version

on:
  pull_request:
    paths:
      - '.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Mirror plugin.json version into marketplace.json
        id: sync
        run: |
          if bash scripts/bump-version.sh --sync 2>&1 | tee /tmp/sync.log; then
            if [[ -n "$(git status --porcelain .claude-plugin/marketplace.json)" ]]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Commit and push sync
        if: steps.sync.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: sync marketplace.json version from plugin.json"
          git push